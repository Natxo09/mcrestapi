<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>MCRestAPI - API Documentation</title>
  <link rel="stylesheet" href="/api/docs/swagger-ui.css">
  <style>
    :root {
      --bg-primary: #111114;
      --bg-secondary: #1a1a1f;
      --bg-tertiary: #222228;
      --bg-hover: #2a2a32;
      --border: #2e2e38;
      --text-primary: #e4e4e8;
      --text-secondary: #9a9aa8;
      --text-muted: #6b6b7b;
      --accent: #4ade80;
      --accent-hover: #22c55e;
      --accent-dim: rgba(74, 222, 128, 0.1);
      --get: #4ade80;
      --post: #60a5fa;
      --put: #fbbf24;
      --delete: #f87171;
    }

    * { box-sizing: border-box; }

    html, body {
      margin: 0;
      padding: 0;
      min-height: 100vh;
      background: var(--bg-primary);
      color: var(--text-primary);
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    }

    body {
      display: flex;
      flex-direction: column;
    }

    #swagger-ui { flex: 1; }

    /* Top bar */
    .swagger-ui .topbar { display: none; }

    .custom-header {
      background: var(--bg-secondary);
      border-bottom: 1px solid var(--border);
      padding: 16px 24px;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .custom-header .brand {
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .custom-header .brand h1 {
      margin: 0;
      font-size: 18px;
      font-weight: 600;
      color: var(--text-primary);
      letter-spacing: -0.3px;
    }

    .custom-header .brand .badge {
      background: var(--accent-dim);
      color: var(--accent);
      font-size: 11px;
      font-weight: 600;
      padding: 3px 8px;
      border-radius: 6px;
      letter-spacing: 0.3px;
    }

    .custom-header .credits {
      font-size: 12px;
      color: var(--text-muted);
    }

    .custom-header .credits a {
      color: var(--text-secondary);
      text-decoration: none;
      transition: color 0.15s;
    }

    .custom-header .credits a:hover {
      color: var(--accent);
    }

    /* Main wrapper */
    .swagger-ui { background: var(--bg-primary); }
    .swagger-ui .wrapper { padding: 20px 24px; max-width: 1200px; }

    /* Info section */
    .swagger-ui .info { margin: 16px 0 32px; }
    .swagger-ui .info hgroup.main { margin: 0; }
    .swagger-ui .info .title { color: var(--text-primary); font-size: 22px; font-weight: 600; }
    .swagger-ui .info .title small { background: var(--accent-dim); color: var(--accent); border-radius: 6px; padding: 2px 8px; font-size: 12px; }
    .swagger-ui .info .title small.version-stamp { background: var(--accent-dim); }
    .swagger-ui .info .title small pre { color: var(--accent); padding: 0; }
    .swagger-ui .info .description, .swagger-ui .info .description p { color: var(--text-secondary); }
    .swagger-ui .info .base-url { color: var(--text-muted); }
    .swagger-ui .info a { color: var(--accent); }

    /* Scheme container */
    .swagger-ui .scheme-container {
      background: var(--bg-secondary);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 12px 16px;
      box-shadow: none;
    }

    /* Tags / sections */
    .swagger-ui .opblock-tag-section { margin-bottom: 8px; }
    .swagger-ui .opblock-tag {
      color: var(--text-primary);
      border-bottom: 1px solid var(--border);
      padding: 12px 0;
    }
    .swagger-ui .opblock-tag:hover { background: transparent; }
    .swagger-ui .opblock-tag small { color: var(--text-muted); }
    .swagger-ui .opblock-tag svg { fill: var(--text-muted); }

    /* Operation blocks */
    .swagger-ui .opblock {
      border-radius: 10px;
      border: 1px solid var(--border);
      margin-bottom: 8px;
      box-shadow: none;
      background: var(--bg-secondary);
    }

    .swagger-ui .opblock .opblock-summary {
      border: none;
      padding: 10px 16px;
    }

    .swagger-ui .opblock .opblock-summary-method {
      border-radius: 6px;
      font-size: 12px;
      font-weight: 700;
      min-width: 60px;
      text-align: center;
      padding: 6px 10px;
    }

    .swagger-ui .opblock .opblock-summary-path { color: var(--text-primary); font-weight: 500; }
    .swagger-ui .opblock .opblock-summary-description { color: var(--text-secondary); }

    /* GET */
    .swagger-ui .opblock.opblock-get {
      background: rgba(74, 222, 128, 0.03);
      border-color: rgba(74, 222, 128, 0.15);
    }
    .swagger-ui .opblock.opblock-get .opblock-summary-method { background: var(--get); color: #000; }
    .swagger-ui .opblock.opblock-get .opblock-summary { border: none; }

    /* POST */
    .swagger-ui .opblock.opblock-post {
      background: rgba(96, 165, 250, 0.03);
      border-color: rgba(96, 165, 250, 0.15);
    }
    .swagger-ui .opblock.opblock-post .opblock-summary-method { background: var(--post); color: #000; }

    /* PUT */
    .swagger-ui .opblock.opblock-put {
      background: rgba(251, 191, 36, 0.03);
      border-color: rgba(251, 191, 36, 0.15);
    }
    .swagger-ui .opblock.opblock-put .opblock-summary-method { background: var(--put); color: #000; }

    /* DELETE */
    .swagger-ui .opblock.opblock-delete {
      background: rgba(248, 113, 113, 0.03);
      border-color: rgba(248, 113, 113, 0.15);
    }
    .swagger-ui .opblock.opblock-delete .opblock-summary-method { background: var(--delete); color: #000; }

    /* Expanded operation */
    .swagger-ui .opblock-body { background: transparent; }
    .swagger-ui .opblock-body pre.microlight {
      background: var(--bg-primary);
      border: 1px solid var(--border);
      border-radius: 8px;
      color: var(--text-primary);
      font-size: 13px;
      padding: 14px;
    }

    .swagger-ui .opblock-description-wrapper,
    .swagger-ui .opblock-external-docs-wrapper {
      color: var(--text-secondary);
      padding: 12px 16px;
    }

    .swagger-ui .opblock-section-header {
      background: var(--bg-tertiary);
      border-bottom: 1px solid var(--border);
      box-shadow: none;
    }
    .swagger-ui .opblock-section-header h4 { color: var(--text-primary); }

    /* Tab & parameter headers */
    .swagger-ui .tab li { color: var(--text-secondary); }
    .swagger-ui .tab li.active { color: var(--text-primary); }
    .swagger-ui table thead tr th { color: var(--text-secondary); border-bottom: 1px solid var(--border); }
    .swagger-ui table thead tr td { color: var(--text-secondary); border-bottom: 1px solid var(--border); }

    /* Parameters */
    .swagger-ui .parameters-col_description p { color: var(--text-secondary); }
    .swagger-ui .parameters-col_name { color: var(--text-primary); }
    .swagger-ui .parameter__name { color: var(--text-primary); }
    .swagger-ui .parameter__name.required::after { color: var(--delete); }
    .swagger-ui .parameter__type { color: var(--text-muted); }
    .swagger-ui .parameter__in { color: var(--text-muted); }

    /* Tables */
    .swagger-ui table tbody tr td { color: var(--text-primary); border-bottom: 1px solid var(--border); }

    /* Inputs */
    .swagger-ui input[type=text],
    .swagger-ui textarea,
    .swagger-ui select {
      background: var(--bg-primary);
      border: 1px solid var(--border);
      border-radius: 6px;
      color: var(--text-primary);
      padding: 8px 10px;
    }
    .swagger-ui input[type=text]:focus,
    .swagger-ui textarea:focus,
    .swagger-ui select:focus {
      border-color: var(--accent);
      outline: none;
    }
    .swagger-ui select { color: var(--text-primary); }

    /* Buttons */
    .swagger-ui .btn {
      border-radius: 6px;
      font-weight: 600;
      font-size: 13px;
      transition: all 0.15s;
    }
    .swagger-ui .btn.execute {
      background: var(--accent);
      color: #000;
      border: none;
    }
    .swagger-ui .btn.execute:hover { background: var(--accent-hover); }
    .swagger-ui .btn.cancel { border-color: var(--border); color: var(--text-secondary); }

    .swagger-ui .btn.authorize {
      color: var(--accent);
      border-color: var(--accent);
    }
    .swagger-ui .btn.authorize svg { fill: var(--accent); }

    /* Responses */
    .swagger-ui .responses-inner h4,
    .swagger-ui .responses-inner h5 { color: var(--text-primary); }
    .swagger-ui .response-col_status { color: var(--text-primary); }
    .swagger-ui .response-col_description { color: var(--text-secondary); }

    .swagger-ui .responses-table thead td { color: var(--text-muted); }

    .swagger-ui .response-col_links { color: var(--text-muted); }

    /* Models / Schemas */
    .swagger-ui section.models {
      border: 1px solid var(--border);
      border-radius: 10px;
      background: var(--bg-secondary);
    }
    .swagger-ui section.models h4 { color: var(--text-primary); }
    .swagger-ui section.models .model-container { background: var(--bg-tertiary); border-radius: 8px; }
    .swagger-ui .model { color: var(--text-primary); }
    .swagger-ui .model-title { color: var(--text-primary); }
    .swagger-ui .model .property { color: var(--text-secondary); }
    .swagger-ui .model .property.primitive { color: var(--accent); }
    .swagger-ui span.model-toggle::after { background: none; }

    /* Authorize dialog */
    .swagger-ui .dialog-ux .modal-ux {
      background: var(--bg-secondary);
      border: 1px solid var(--border);
      border-radius: 12px;
    }
    .swagger-ui .dialog-ux .modal-ux-header { border-bottom: 1px solid var(--border); }
    .swagger-ui .dialog-ux .modal-ux-header h3 { color: var(--text-primary); }
    .swagger-ui .dialog-ux .modal-ux-content p { color: var(--text-secondary); }
    .swagger-ui .dialog-ux .modal-ux-content label { color: var(--text-primary); }
    .swagger-ui .dialog-ux .backdrop-ux { background: rgba(0, 0, 0, 0.6); }

    /* Auth wrapper */
    .swagger-ui .auth-wrapper { display: flex; align-items: center; }
    .swagger-ui .auth-wrapper .authorize { padding-right: 16px; }

    /* Loading */
    .swagger-ui .loading-container .loading::after { color: var(--text-muted); }

    /* Links */
    .swagger-ui a { color: var(--accent); }
    .swagger-ui a:hover { color: var(--accent-hover); }

    /* Arrow icons */
    .swagger-ui svg:not(:root) { fill: var(--text-muted); }
    .swagger-ui .expand-operation svg { fill: var(--text-muted); }

    /* Copy button */
    .swagger-ui .copy-to-clipboard { background: var(--bg-tertiary); border-radius: 4px; }

    /* Response codes */
    .swagger-ui .responses-wrapper .col_header { color: var(--text-secondary); }

    /* Scrollbar */
    ::-webkit-scrollbar { width: 8px; height: 8px; }
    ::-webkit-scrollbar-track { background: var(--bg-primary); }
    ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }
    ::-webkit-scrollbar-thumb:hover { background: var(--text-muted); }

    /* Footer */
    .custom-footer {
      text-align: center;
      padding: 24px;
      color: var(--text-muted);
      font-size: 12px;
      border-top: 1px solid var(--border);
      margin-top: 40px;
    }
    .custom-footer a {
      color: var(--text-secondary);
      text-decoration: none;
      transition: color 0.15s;
    }
    .custom-footer a:hover { color: var(--accent); }
  </style>
</head>
<body>
  <div class="custom-header">
    <div class="brand">
      <h1>MCRestAPI</h1>
      <span class="badge">v1.0.0</span>
    </div>
    <div class="credits">
      Developed by <a href="https://natxo.dev" target="_blank" rel="noopener">Natxo</a>
    </div>
  </div>
  <div id="swagger-ui"></div>
  <div class="custom-footer">
    MCRestAPI &mdash; Developed by <a href="https://natxo.dev" target="_blank" rel="noopener">Natxo</a>
  </div>
  <script src="/api/docs/swagger-ui-bundle.js"></script>
  <script src="/api/docs/swagger-ui-standalone-preset.js"></script>
  <script>
    window.onload = () => {
      SwaggerUIBundle({
        url: "/api/openapi.json",
        dom_id: '#swagger-ui',
        deepLinking: true,
        presets: [
          SwaggerUIBundle.presets.apis,
          SwaggerUIStandalonePreset
        ],
        layout: "StandaloneLayout",
        defaultModelsExpandDepth: 1,
        docExpansion: "list",
        syntaxHighlight: {
          theme: "monokai"
        }
      });
    };
  </script>
</body>
</html>
